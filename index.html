<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper - Bộ Điều Khiển Toàn Diện</title>
    <style>
        :root { --primary-green: #4CAF50; --active-blue: #3f51b5; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 5px; background-color: #f9f9f9; font-size: 12px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        
        .tabs-header { display: flex; gap: 4px; border-bottom: 2px solid #3f51b5; padding-bottom: 4px; margin-bottom: 10px; overflow-x: auto; white-space: nowrap; }
        .tab-link { flex: 1; padding: 8px 4px; background-color: #4CAF50; color: white; border: none; font-weight: bold; border-radius: 3px; cursor: pointer; text-align: center; font-size: 11px; }
        .tab-link.active { background-color: white; color: #3f51b5; border: 1px solid #3f51b5; border-bottom: none; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h3 { font-size: 14px; margin: 10px 0 5px 0; color: #111; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .btn-block { width: 100%; display: block; margin-bottom: 8px; }
        .btn { background-color: #4CAF50; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-gray { background-color: #6c757d; }
        .btn-blue { background-color: #2196F3; }
        .btn-red { background-color: #f44336; }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 3px; margin-bottom: 6px; }
        label { font-weight: bold; display: block; margin-bottom: 3px; }

        .preview-box { width: 100%; max-width: 400px; height: 300px; border: 2px solid #333; margin: 10px auto; background: white; position: relative; overflow: hidden; }
        .matrix-preview { background: black; color: white; padding: 10px; text-align: center; font-family: monospace; font-size: 24px; letter-spacing: 2px; font-weight: bold; border: 2px dashed #555; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; margin-bottom: 8px; }
        .icon-btn { padding: 4px 2px; border: 1px solid #ccc; background: #fff; font-size: 10px; text-align: center; cursor: pointer; border-radius: 2px; }
        
        #log-terminal { background: #fafafa; border: 1px solid #ddd; padding: 6px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #333; margin-top: 10px; border-left: 3px solid #3f51b5; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs-header">
        <button class="tab-link active" onclick="openTab(event, 'tab-setting')">Cài đặt màn hình điện tử</button>
        <button class="tab-link" onclick="openTab(event, 'tab-countdown')">Mô-đun đếm ngược</button>
        <button class="tab-link" onclick="openTab(event, 'tab-image')">Chuyển ảnh</button>
        <button class="tab-link" onclick="openTab(event, 'tab-designer')">Trình thiết kế mẫu</button>
    </div>

    <div id="tab-setting" class="tab-content active">
        <h3>Bộ điều khiển Bluetooth màn hình E-Paper - Kết nối thiết bị trước khi cài đặt đồng hồ.</h3>
        <div class="grid-2">
            <button class="btn" style="background-color: #2196F3;" onclick="scanBluetoothDevice()">Thiết bị quét</button>
            <button class="btn btn-gray" onclick="reconnectDevice()">Kết nối lại</button>
        </div>
        <button class="btn btn-block btn-gray" onclick="clearLog()">Xóa nhật ký</button>
        
        <div class="grid-2" style="grid-template-columns: 4fr 1fr;">
            <button class="btn" id="btn-time-sync" onclick="syncTime()">Thời gian thiết lập: Đồng bộ ngay</button>
            <input type="number" value="0" id="sync-offset">
        </div>

        <div class="grid-2">
            <button class="btn" onclick="sendCommand('MODE_CLOCK')">Chuyển sang Chế độ đồng hồ</button>
            <button class="btn" onclick="sendCommand('MODE_CALENDAR')">Chuyển sang Chế độ Lịch</button>
            <button class="btn" onclick="sendCommand('TOGGLE_COLOR')">Chuyển đổi màu đồng hồ</button>
            <button class="btn" onclick="sendCommand('SET_IMG_MODE')">Đặt chế độ hình ảnh</button>
            <button class="btn" onclick="sendCommand('INVERT_COLOR')">Bật/tắt chế độ đảo màu đen trắng</button>
            <button class="btn" onclick="sendCommand('ROTATE_180')">Xoay màn hình 180 độ</button>
        </div>

        <input type="text" id="hex-refresh-input" value="Hiệu chỉnh làm mới một phần màu đỏ (hex 01-0f). Tắt màu đỏ và hiệu chỉnh màu đen (10-f0).">
        <div class="grid-2">
            <button class="btn" onclick="sendCommand('PARTIAL_CONFIG')">Thiết lập hiệu chỉnh làm mới một phần</button>
            <button class="btn btn-gray" onclick="location.reload()">Làm mới trang web</button>
            <button class="btn" onclick="sendCommand('AA')">Gửi AA</button>
            <button class="btn" onclick="sendCommand('AB')">Gửi AB</button>
        </div>

        <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 8px;">
            <span>Giờ bắt đầu:</span><input type="number" id="sleep-start" value="0" style="width:50px; margin:0;">
            <span>Giờ kết thúc:</span><input type="number" id="sleep-end" value="0" style="width:50px; margin:0;">
            <button class="btn" style="flex:1;" onclick="sendCommand('SLEEP_ON')">Bật chế độ ngủ</button>
        </div>
        <button class="btn btn-block btn-red" onclick="sendCommand('SLEEP_OFF')">Tắt chế độ ngủ + Chế độ tiết kiệm pin + Sửa chữa</button>

        <label>Biển báo đỗ xe đồng hồ độ phân giải thấp 2,13" - Nhập số:</label>
        <input type="text" id="parking-num" placeholder="Con số:">
        <button class="btn btn-block" onclick="sendCommand('SET_PARKING_NUM')">Đặt số hiển thị</button>

        <label>Kích hoạt:</label>
        <input type="text" id="active-code" placeholder="Nhập mã kích hoạt:">
        <button class="btn btn-block btn-blue" onclick="sendCommand('ACTIVATE_DEV')">Kích hoạt</button>
    </div>

    <div id="tab-countdown" class="tab-content">
        <h3>Công cụ chọn ngày đếm ngược</h3>
        <input type="text" value="COUNT" id="countdown-text-input" oninput="document.getElementById('countdown-preview').innerText=this.value">
        <div class="matrix-preview" id="countdown-preview">COUNT</div>
        <div class="grid-2" style="margin-top:10px;">
            <button class="btn btn-blue" onclick="sendCommand('START_COUNTDOWN')">Bắt đầu đếm ngược</button>
            <button class="btn btn-gray" onclick="sendCommand('STOP_COUNTDOWN')">Dừng đếm ngược</button>
        </div>
    </div>

    <div id="tab-image" class="tab-content">
        <h3>Tải ảnh lên màn hình</h3>
        <input type="file" accept="image/*" style="margin-bottom:8px;">
        <div class="grid-2">
            <button class="btn btn-blue" onclick="logMessage('Áp dụng bộ lọc...')">Áp dụng bộ lọc ảnh</button>
            <button class="btn btn-red" onclick="sendCommand('UPLOAD_IMAGE')">Tải lên màn hình ngay</button>
        </div>
    </div>

    <div id="tab-designer" class="tab-content">
        <div class="preview-box" style="display:flex; justify-content:center; align-items:center; background:#eee;">Khung Canvas 400x300</div>
        <div class="icon-grid" style="margin-top:8px;">
            <script>
                for(let i=1; i<=25; i++) {
                    document.write(`<div class="icon-btn" onclick="logMessage('Đã chọn icon I${i}')">I${i}</div>`);
                }
            </script>
        </div>
        <button class="btn btn-block btn-blue">Áp dụng mẫu và truyền dữ liệu</button>
    </div>

    <div id="log-terminal">Hệ thống: Sẵn sàng.</div>
</div>

<script>
    let bleDevice = null;
    let bleCharacteristic = null;

    // Cấu hình mã UUID lọc mở rộng để trình duyệt ép buộc hiển thị bảng kết nối công khai
    const UART_SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
    const UART_TX_CHAR_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

    function openTab(evt, tabId) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
        tablinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
        document.getElementById(tabId).style.display = "block";
        evt.currentTarget.className += " active";
    }
    
    function logMessage(msg) {
        const term = document.getElementById('log-terminal');
        term.innerHTML += `<br>▸ ${msg}`;
        term.scrollTop = term.scrollHeight;
    }

    function clearLog() { document.getElementById('log-terminal').innerHTML = "Nhật ký:"; }

    // HÀM QUÉT THỰC TẾ SỬ DỤNG PHƯƠNG THỨC MỞ RỘNG
    async function scanBluetoothDevice() {
        logMessage("Đang yêu cầu kích hoạt bộ quét thiết bị...");
        if (!navigator.bluetooth) {
            logMessage("LỖI: Trình duyệt này hoàn toàn không hỗ trợ Web Bluetooth API.");
            alert("Trình duyệt không hỗ trợ Bluetooth hoặc chưa bật quyền!");
            return;
        }

        try {
            // Sử dụng cấu hình nới lỏng tối đa để ép buộc Chrome hiển thị giao diện chọn thiết bị
            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [UART_SERVICE_UUID]
            });

            logMessage("Đã chọn thiết bị: " + bleDevice.name);
            logMessage("Đang kết nối tới cổng GATT...");
            const server = await bleDevice.gatt.connect();
            
            logMessage("Đang lấy dịch vụ GATT...");
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(UART_TX_CHAR_UUID);
            
            logMessage("KẾT NỐI THÀNH CÔNG! Thiết bị đã sẵn sàng nhận lệnh.");
            alert("Kết nối Bluetooth thành công!");
        } catch (error) {
            logMessage("Yêu cầu quét bị hủy hoặc gặp lỗi: " + error.message);
        }
    }

    async function sendCommand(action) {
        if (!bleCharacteristic) {
            logMessage("Lỗi: Chưa có kết nối Bluetooth hoạt động.");
            alert("Vui lòng kết nối Bluetooth trước!");
            return;
        }
        try {
            let encoder = new TextEncoder();
            let dataBuffer = encoder.encode(action + '\n');
            await bleCharacteristic.writeValue(dataBuffer);
            logMessage("Đã gửi thành công lệnh: " + action);
        } catch (error) {
            logMessage("Lỗi gửi dữ liệu: " + error.message);
        }
    }

    function reconnectDevice() {
        if (bleDevice && bleDevice.gatt.connected) {
            logMessage("Thiết bị đang được kết nối sẵn.");
        } else if (bleDevice) {
            logMessage("Đang thử kết nối lại...");
            bleDevice.gatt.connect().then(() => logMessage("Đã kết nối lại!")).catch(e => logMessage("Thất bại: " + e.message));
        } else {
            logMessage("Chưa từng kết nối với thiết bị nào trước đây.");
        }
    }

    function syncTime() {
        let now = new Date();
        document.getElementById('btn-time-sync').innerText = `Thời gian thiết lập: ${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.toTimeString().split(' ')[0]}`;
        logMessage("Đã cập nhật bộ đếm thời gian hệ thống.");
    }
</script>

</body>
</html>
