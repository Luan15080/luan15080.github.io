<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Điều Khiển Màn Hình E-Paper của Luân</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .tab-btn { padding: 10px 15px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: #007bff; }
        .canvas-area { border: 2px dashed #ccc; width: 400px; height: 300px; margin: 10px auto; background: #fff; position: relative; overflow: hidden; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; width: 85%; font-weight: bold; }
        .btn-green { background-color: #4CAF50; }
        .btn-blue { background-color: #007bff; }
        .btn-red { background-color: #dc3545; }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; text-align: left; }
        .panel-box { border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
        #log { margin-top: 20px; padding: 10px; background: #eee; border-radius: 4px; text-align: left; font-size: 12px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bộ điều khiển Bluetooth màn hình E-Paper</h2>
    <p style="font-size: 13px; color: #666;">Kết nối thiết bị trước khi cài đặt đồng hồ.</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('setting')">Cài đặt màn hình</button>
        <button class="tab-btn" onclick="switchTab('design')">Trình thiết kế mẫu</button>
    </div>

    <!-- TAB 1: CAI DAT -->
    <div id="tab-setting">
        <div class="btn-group">
            <button class="btn btn-green" onclick="connectBLE()">Thiết bị quét</button>
            <button class="btn btn-green" onclick="sendCommand('RECONNECT')">Kết nối lại</button>
            <button class="btn btn-green" onclick="sendCommand('CLOCK_MODE')">Chuyển sang Chế độ đồng hồ</button>
            <button class="btn btn-green" onclick="sendCommand('CALENDAR_MODE')">Chuyển sang Chế độ Lịch</button>
            <button class="btn btn-green" onclick="sendCommand('INVERT_COLOR')">Bật/tắt chế độ đảo màu đen trắng</button>
            <button class="btn btn-green" onclick="sendCommand('ROTATE_180')">Xoay màn hình 180 độ</button>
        </div>
    </div>

    <!-- TAB 2: THIET KE -->
    <div id="tab-design" style="display:none;">
        <div class="canvas-area" id="canvas"></div>
        <div class="control-panel">
            <div class="panel-box">
                <label>Thêm phần tử:</label><br>
                <select id="elementType" style="width:100%; margin: 5px 0; padding: 5px;">
                    <option value="time">Thời gian (Giờ:Phút)</option>
                    <option value="date">Ngày tháng</option>
                    <option value="temp">Nhiệt độ (°C)</option>
                    <option value="battery">Biểu tượng Pin</option>
                </select>
                <button class="btn btn-green" style="width:100%;" onclick="addElement()">Thêm phần tử</button>
            </div>
            <div class="panel-box">
                <label>Kích thước phần tử:</label><br>
                <input type="number" id="elWidth" value="40" style="width:40px;"> x 
                <input type="number" id="elHeight" value="40" style="width:40px;">
                <button onclick="updateSize()" style="padding:2px 5px;">Áp dụng</button>
                <br><br>
                <button class="btn btn-red" style="width:100%; padding:5px;" onclick="clearCanvas()">Xóa tất cả Canvas</button>
            </div>
        </div>
        <button class="btn btn-green" style="width:100%; margin-top:15px;" onclick="deployTemplate()">Áp dụng mẫu và truyền dữ liệu</button>
    </div>

    <div id="log">Nhật ký: Khung vẽ màn hình sẵn sàng: 400x300</div>
</div>

<script>
    let bleDevice = null;
    let bleCharacteristic = null;

    function log(msg) {
        document.getElementById('log').innerHTML += "<br>" + msg;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'setting') {
            document.getElementById('tab-setting').style.display = 'block';
            document.getElementById('tab-design').style.display = 'none';
            event.target.classList.add('active');
        } else {
            document.getElementById('tab-setting').style.display = 'none';
            document.getElementById('tab-design').style.display = 'block';
            event.target.classList.add('active');
        }
    }

    async function connectBLE() {
        try {
            log("Đang quét thiết bị Bluetooth...");
            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] 
            });
            log("Đang kết nối tới: " + bleDevice.name);
            const server = await bleDevice.gatt.connect();
            log("Đã kết nối GATT thành công.");
        } catch (error) {
            log("Lỗi kết nối: " + error);
        }
    }

    function sendCommand(cmd) {
        log("Đã gửi lệnh: " + cmd);
        // Hàm gửi dữ liệu byte xuống mạch ESP32
    }

    function addElement() {
        let type = document.getElementById('elementType').value;
        let canvas = document.getElementById('canvas');
        let newEl = document.createElement('div');
        newEl.style.position = 'absolute';
        newEl.style.left = '50px';
        newEl.style.top = '50px';
        newEl.style.border = '1px solid black';
        newEl.style.padding = '5px';
        newEl.style.background = '#ddd';
        newEl.style.cursor = 'move';
        newEl.innerText = type.toUpperCase();
        canvas.appendChild(newEl);
        log("Đã thêm phần tử: " + type);
    }

    function clearCanvas() {
        document.getElementById('canvas').innerHTML = '';
        log("Đã xóa sạch Canvas.");
    }

    function deployTemplate() {
        log("Đang biên dịch bố cục và truyền xuống E-Paper...");
    }
</script>
</body>
</html>
