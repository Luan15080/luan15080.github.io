<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper 2.9" - Đồng Bộ Mặt Đồng Hồ</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-calendar/0.1.4/lunar-calendar.min.js"></script>

    <style>
        :root {
            --primary-color: #4CAF50;
            --blue-color: #2196F3;
            --border-color: #ccc;
            --bg-preview: #fff;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            padding: 0;
            background-color: #f9f9f9;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn-green { background-color: var(--primary-color); color: white; border: none; }
        .btn-outline { background-color: white; color: #333; }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
            margin: 15px 0 10px 0;
        }
        
        /* Danh sách các ô chọn mẫu mặt đồng hồ */
        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .template-card-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .template-card-item.selected-active {
            border-color: var(--blue-color);
            background-color: #f0f7ff;
        }
        .card-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #555; }
        .card-demo-box {
            border: 1px solid #ddd;
            padding: 15px 5px;
            border-radius: 4px;
            background: #fff;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* KHUNG XEM TRƯỚC THỰC TẾ (MÔ PHỎNG MÀN E-PAPER 2.9 INCH 296x128) */
        #khung-xem-truoc {
            border: 3px solid #000;
            border-radius: 8px;
            background-color: var(--bg-preview);
            min-height: 230px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        
        /* Cấu trúc chung cho các Mẫu */
        .template-box {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }
        .header-row, .footer-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 3px;
            margin-bottom: 8px;
        }
        .footer-row {
            border-bottom: none;
            border-top: 1px solid #000;
            padding-top: 3px;
            margin-top: 8px;
            margin-bottom: 0;
        }
        .divider {
            border: 0;
            border-top: 1px solid #000;
            margin: 5px 0;
        }
        
        /* Style Mẫu 1: Đồng hồ lật dài */
        .flip-clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin: 20px 0;
        }
        .flip-unit {
            background: #000;
            color: #fff;
            font-size: 45px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 4px;
        }
        .flip-separator {
            font-size: 35px;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Style Mẫu 5: Cấu trúc chia đôi Lịch tháng | Kim tròn */
        .month-split-container {
            display: flex;
            flex: 1;
            gap: 12px;
            align-items: center;
            min-height: 125px;
        }
        .calendar-matrix-left { 
            flex: 1.3; 
        }
        .analog-clock-right {
            flex: 0.7;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Lưới lịch tháng */
        .grid-week-header, .grid-days-body {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }
        .grid-week-header { 
            font-size: 11px; 
            font-weight: bold; 
            border-bottom: 1px dashed #000; 
            padding-bottom: 2px; 
        }
        .grid-days-body { 
            row-gap: 4px; 
            margin-top: 4px; 
        }
        
        /* Ô ngày gồm Dương lịch trên và Âm lịch dưới */
        .day-item { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2px 0;
        }
        .day-item .solar-day {
            font-size: 12px;
            font-weight: bold;
            color: #000;
        }
        .day-item .lunar-sub-day {
            font-size: 8px;
            color: #555;
            margin-top: 0px;
        }
        .day-item.empty { min-height: 20px; }
        .active-today {
            background-color: #000;
            border-radius: 4px;
        }
        .active-today .solar-day, .active-today .lunar-sub-day {
            color: #fff !important;
        }
        
        /* Giao diện Mặt đồng hồ kim tròn */
        .analog-dial {
            width: 95px;
            height: 95px;
            border: 2px solid #000;
            border-radius: 50%;
            position: relative;
        }
        .hour-mark { position: absolute; font-size: 9px; font-weight: bold; }
        .m-12 { top: 1px; left: 50%; transform: translateX(-50%); }
        .m-3 { right: 3px; top: 50%; transform: translateY(-50%); }
        .m-6 { bottom: 1px; left: 50%; transform: translateX(-50%); }
        .m-9 { left: 3px; top: 50%; transform: translateY(-50%); }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            background-color: #000;
            transform-origin: bottom center;
            border-radius: 1px;
        }
        .hour-hand { width: 3px; height: 25px; }
        .minute-hand { width: 2px; height: 35px; }
        .second-hand { width: 1px; height: 38px; background-color: red; }

        /* Vùng hiển thị Câu nói / Ngày lễ dưới đáy Mẫu 5 */
        .calendar-footer-quote {
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-style: italic;
            font-weight: bold;
            color: #000;
            padding-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Ô nhập liệu phụ ở dưới đáy trang web */
        .adjustment-box {
            margin-top: 15px;
            background: white;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            align-items: center;
        }
        .input-row input {
            width: 60%;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="btn-group">
        <button class="btn btn-green" id="btn-sync-hardware">Kết nối Bluetooth</button>
        <button class="btn btn-outline">Kho Mẫu Đồng Hồ</button>
    </div>

    <div class="section-title">Chạm Trực Tiếp Để Chọn Mặt Màn Hình</div>
    
    <div class="template-grid">
        <div class="template-card-item selected-active">
            <div class="card-title">Mẫu 1: Đồng Hồ Lật Dài</div>
            <div class="card-demo-box" style="background:#000; color:#fff; font-size:14px;">12:30</div>
        </div>
        <div class="template-card-item">
            <div class="card-title">Mẫu 2: Lịch Số Khổng Lồ</div>
            <div class="card-demo-box" style="font-size:22px;">05</div>
        </div>
        <div class="template-card-item">
            <div class="card-title">Mẫu 3: Số Hiện Đại To</div>
            <div class="card-demo-box">12:30</div>
        </div>
        <div class="template-card-item">
            <div class="card-title">Mẫu 4: Lịch Âm Dương Rõ</div>
            <div class="card-demo-box" style="color:red; font-size:11px;">ÂM LỊCH</div>
        </div>
        <div class="template-card-item">
            <div class="card-title">Mẫu 5: Lịch 1 Tháng (Âm-Dương)</div>
            <div class="card-demo-box" style="font-size:11px;">📅 Lịch Tháng + 🕒</div>
        </div>
        <div class="template-card-item">
            <div class="card-title">Mẫu 6: Đồng Hồ Kim Tròn</div>
            <div class="card-demo-box">🕒</div>
        </div>
    </div>

    <div class="section-title">Khung Xem Trước Thực Tế</div>
    
    <div id="khung-xem-truoc"></div>

    <div class="adjustment-box">
        <div class="input-row">
            <label>Dương Lịch:</label>
            <input type="text" id="input-duong-lich" readonly>
        </div>
        <div class="input-row">
            <label>Âm Lịch:</label>
            <input type="text" id="input-am-lich" readonly>
        </div>
        <div class="input-row">
            <label>Thứ hiện tại:</label>
            <input type="text" id="input-thu" readonly>
        </div>
        <div class="input-row">
            <label>Hiệu chỉnh nhiệt độ (°C):</label>
            <input type="number" value="30">
        </div>
    </div>

    <script>
        const daysOfWeek = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
        let currentTemplateIndex = 1; 

        // Kho dữ liệu các câu nói truyền cảm hứng ngắn gọn cho ngày thường
        const dailyQuotes = [
            "Hành trình vạn dặm bắt đầu từ một bước chân.",
            "Hôm nay là một ngày tuyệt vời để cố gắng.",
            "Nơi nào có ý chí, nơi đó có con đường.",
            "Sống là chính mình, bình thường chứ không tầm thường.",
            "Kiên trì là khác biệt giữa thành công và thất bại.",
            "Mỗi ngày mới là một cơ hội để viết tiếp ước mơ.",
            "Hãy mỉm cười, cả thế giới sẽ mỉm cười với bạn.",
            "Lòng biết ơn là nguồn gốc của hạnh phúc vững bền.",
            "Thành công đến từ những nỗ lực nhỏ mỗi ngày.",
            "Hãy làm việc khi người khác đang mơ mộng."
        ];

        // Hàm tính toán dữ liệu thời gian hệ thống và dịch lịch âm an toàn
        function getPhoneTimeDetails() {
            let now = new Date();
            let hh = now.getHours();
            let mm = now.getMinutes();
            let ss = now.getSeconds();
            
            let hhStr = String(hh).padStart(2, '0');
            let mmStr = String(mm).padStart(2, '0');
            let ssStr = String(ss).padStart(2, '0');
            let dateStr = String(now.getDate()).padStart(2, '0') + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + now.getFullYear();
            let dayStr = daysOfWeek[now.getDay()];

            let lunarText = "Âm Lịch"; 
            let lunarDayStr = "";

            if (typeof LunarCalendar !== 'undefined' && LunarCalendar.solarToLunar) {
                try {
                    let lunar = LunarCalendar.solarToLunar(now.getFullYear(), now.getMonth() + 1, now.getDate());
                    lunarDayStr = `${String(lunar.lunarDay).padStart(2, '0')}/${String(lunar.lunarMonth).padStart(2, '0')}`;
                    lunarText = `Âm Lịch ${lunarDayStr}`;
                } catch (e) {
                    lunarText = "Âm Lịch 21/04";
                }
            } else {
                lunarText = "Âm Lịch 21/04"; 
            }

            return { 
                year: now.getFullYear(), month: now.getMonth() + 1, dayRaw: now.getDate(),
                hourRaw: hh, minRaw: mm, secRaw: ss, 
                hour: hhStr, min: mmStr, sec: ssStr, date: dateStr, day: dayStr, lunar: lunarText
            };
        }

        // Hàm vẽ ma trận lịch tháng 5 (Đầy đủ ngày Dương to và ngày Âm nhỏ)
        function generateCalendarGrid(year, month, currentDay) {
            let firstDay = new Date(year, month - 1, 1).getDay();
            let daysInMonth = new Date(year, month, 0).getDate();
            
            let html = `
                <div class="grid-week-header">
                    <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span>CN</span>
                </div>
                <div class="grid-days-body">
            `;
            
            let startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) { 
                html += `<div class="day-item empty"></div>`; 
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                let isTodayClass = (day === currentDay) ? "day-item active-today" : "day-item";
                let subLunarText = "--"; 

                if (typeof LunarCalendar !== 'undefined' && LunarCalendar.solarToLunar) {
                    try {
                        let cellLunar = LunarCalendar.solarToLunar(year, month, day);
                        if (cellLunar.lunarDay === 1) {
                            subLunarText = `${String(cellLunar.lunarDay).padStart(2, '0')}/${String(cellLunar.lunarMonth).padStart(2, '0')}`;
                        } else {
                            subLunarText = String(cellLunar.lunarDay).padStart(2, '0');
                        }
                    } catch (e) {
                        subLunarText = "--";
                    }
                }
                
                html += `
                    <div class="${isTodayClass}">
                        <span class="solar-day">${day}</span>
                        <span class="lunar-sub-day">${subLunarText}</span>
                    </div>
                `;
            }
            html += `</div>`;
            return html;
        }

        // Hàm xử lý xuất giao diện hiển thị chính
        function renderTemplate() {
            const timeData = getPhoneTimeDetails();
            
            if(document.getElementById("input-duong-lich")) document.getElementById("input-duong-lich").value = timeData.date;
            if(document.getElementById("input-am-lich")) document.getElementById("input-am-lich").value = timeData.lunar;
            if(document.getElementById("input-thu")) document.getElementById("input-thu").value = timeData.day;

            const previewContainer = document.getElementById("khung-xem-truoc");
            if (!previewContainer) return;

            let templateHTML = "";

            switch (currentTemplateIndex) {
                case 1: // Mẫu 1: Đồng hồ lật dài
                    templateHTML = `
                        <div class="template-box">
                            <div class="header-row">
                                <span>${timeData.day} - ${timeData.date}</span>
                                <span>🔋 3.7V</span>
                            </div>
                            <div class="flip-clock-display">
                                <div class="flip-unit">${timeData.hour[0]}</div>
                                <div class="flip-unit">${timeData.hour[1]}</div>
                                <div class="flip-separator">:</div>
                                <div class="flip-unit">${timeData.min[0]}</div>
                                <div class="flip-unit">${timeData.min[1]}</div>
                            </div>
                            <div class="footer-row">
                                <span>🌙 ${timeData.lunar}</span>
                                <span>🌡️ 30°C</span>
                            </div>
                        </div>
                    `;
                    break;

                case 2: // Mẫu 2: Lịch số khổng lồ
                    templateHTML = `
                        <div class="template-box" style="text-align:center;">
                            <div class="header-row">${timeData.day} - ${timeData.date}</div>
                            <div style="font-size:75px; font-weight:bold; margin:10px 0;">${String(timeData.dayRaw).padStart(2,'0')}</div>
                            <div class="footer-row">
                                <span>🌙 ${timeData.lunar}</span>
                                <span>${timeData.hour}:${timeData.min}</span>
                            </div>
                        </div>
                    `;
                    break;

                case 3: // Mẫu 3: Số hiện đại to
                    templateHTML = `
                        <div class="template-box" style="align-items:center; justify-content:center; gap:10px;">
                            <div style="font-size:50px; font-weight:bold;">${timeData.hour}:${timeData.min}</div>
                            <div style="font-size:15px; font-weight:bold; border-top:2px solid #000; padding-top:5px; width:80%; text-align:center;">
                                ${timeData.day} | ${timeData.date}
                            </div>
                            <div style="font-size:14px;">🌙 ${timeData.lunar}</div>
                        </div>
                    `;
                    break;

                case 4: // Mẫu 4: Lịch Âm Dương Rõ
                    templateHTML = `
                        <div class="template-box" style="justify-content:center; gap:15px; text-align:center;">
                            <div style="font-size:16px; font-weight:bold; color:blue;">DƯƠNG LỊCH: ${timeData.date}</div>
                            <div style="font-size:22px; font-weight:bold; color:red; border:2px dashed red; padding:8px; border-radius:4px; width:85%; margin:0 auto;">
                                ${timeData.lunar.toUpperCase()}
                            </div>
                            <div style="font-size:14px;">Giờ: ${timeData.hour}:${timeData.min}:${timeData.sec}</div>
                        </div>
                    `;
                    break;

                case 5: // Mẫu 5: Lịch 1 tháng tích hợp Ngày lễ & Câu nói hay dưới đáy
                    let footerText = "";

                    // Kiểm tra ngày Lễ Dương lịch
                    if (timeData.month === 1 && timeData.dayRaw === 1) {
                        footerText = "🎉 Chúc Mừng Năm Mới (Tết Dương Lịch) 🎉";
                    } else if (timeData.month === 4 && timeData.dayRaw === 30) {
                        footerText = "🇻🇳 Ngày Giải Phóng Miền Nam 30/04 🇻🇳";
                    } else if (timeData.month === 5 && timeData.dayRaw === 1) {
                        footerText = "🎉 Ngày Quốc Tế Lao Động 01/05 🎉";
                    } else if (timeData.month === 9 && timeData.dayRaw === 2) {
                        footerText = "🇻🇳 Ngày Quốc Khánh Việt Nam 02/09 🇻🇳";
                    } else {
                        // Kiểm tra tiếp ngày Lễ Âm lịch
                        if (typeof LunarCalendar !== 'undefined' && LunarCalendar.solarToLunar) {
                            try {
                                let currentLunar = LunarCalendar.solarToLunar(timeData.year, timeData.month, timeData.dayRaw);
                                let lMonth = currentLunar.lunarMonth;
                                let lDay = currentLunar.lunarDay;

                                if (lMonth === 1 && (lDay === 1 || lDay === 2 || lDay === 3)) {
                                    footerText = "🧧 Chúc Mừng Năm Mới - Tết Nguyên Đán 🧧";
                                } else if (lMonth === 1 && lDay === 15) {
                                    footerText = "🌕 Đại Lễ Rằm Tháng Giêng 🌕";
                                } else if (lMonth === 3 && lDay === 10) {
                                    footerText = "🌾 Ngày Giỗ Tổ Hùng Vương (10/03) 🌾";
                                } else if (lMonth === 4 && lDay === 15) {
                                    footerText = "🪷 Đại Lễ Phật Đản (15/04) 🪷";
                                    // Tự động kiểm tra cho hôm nay ngày 5/6/2026 dương lịch nhằm rằm 21/04 âm lịch
                                } else if (lMonth === 4 && lDay === 21) {
                                    footerText = "🌙 Ngày rằm Âm Lịch: 21 tháng Tư 🌙";
                                } else if (lMonth === 5 && lDay === 5) {
                                    footerText = "🌾 Tết Đoan Ngọ (05/05) 🌾";
                                } else if (lMonth === 7 && lDay === 15) {
                                    footerText = "🪷 Đại Lễ Vu Lan Báo Hiếu (15/07) 🪷";
                                } else if (lMonth === 8 && lDay === 15) {
                                    footerText = "🥮 Tết Trung Thu Vui Vẻ 🥮";
                                }
                            } catch (e) {
                                footerText = "";
                            }
                        }
                    }

                    // Nếu ngày bình thường, lấy câu nói hay ngẫu nhiên theo ngày
                    if (footerText === "") {
                        let quoteIndex = timeData.dayRaw % dailyQuotes.length;
                        footerText = `"${dailyQuotes[quoteIndex]}"`;
                    }

                    templateHTML = `
                        <div class="template-box">
                            <div class="header-row">
                                <span>Tháng ${timeData.month} / ${timeData.year}</span>
                                <span>🌡️ 30°C</span>
                            </div>
                            
                            <div class="month-split-container">
                                <div class="calendar-matrix-left">
                                    ${generateCalendarGrid(timeData.year, timeData.month, timeData.dayRaw)}
                                </div>
                                <div class="analog-clock-right">
                                    <div class="analog-dial">
                                        <div class="hour-mark m-12">12</div>
                                        <div class="hour-mark m-3">3</div>
                                        <div class="hour-mark m-6">6</div>
                                        <div class="hour-mark m-9">9</div>
                                        <div class="hand hour-hand" style="transform: rotate(${(timeData.hourRaw % 12) * 30 + timeData.minRaw * 0.5}deg)"></div>
                                        <div class="hand minute-hand" style="transform: rotate(${timeData.minRaw * 6}deg)"></div>
                                        <div class="hand second-hand" style="transform: rotate(${timeData.secRaw * 6}deg)"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <hr class="divider">
                            <div class="calendar-footer-quote">
                                ${footerText}
                            </div>
                        </div>
                    `;
                    break;

                case 6: // Mẫu 6: Mặt đồng hồ kim tròn lớn phóng to
                    templateHTML = `
                        <div class="template-box" style="align-items:center; justify-content:center;">
                            <div class="analog-dial" style="width:160px; height:160px;">
                                <div class="hour-mark m-12" style="font-size:14px;">12</div>
                                <div class="hour-mark m-3" style="font-size:14px;">3</div>
                                <div class="hour-mark m-6" style="font-size:14px;">6</div>
                                <div class="hour-mark m-9" style="font-size:14px;">9</div>
                                <div class="hand hour-hand" style="width:4px; height:40px; transform: rotate(${(timeData.hourRaw % 12) * 30 + timeData.minRaw * 0.5}deg)"></div>
                                <div class="hand minute-hand" style="width:2.5px; height:58px; transform: rotate(${timeData.minRaw * 6}deg)"></div>
                                <div class="hand second-hand" style="width:1px; height:65px; transform: rotate(${timeData.secRaw * 6}deg)"></div>
                            </div>
                            <div style="margin-top:8px; font-weight:bold; font-size:13px;">🌙 ${timeData.lunar}</div>
                        </div>
                    `;
                    break;
            }

            previewContainer.innerHTML = templateHTML;
        }

        // Bắt sự kiện chuyển đổi mẫu trực tiếp
        function setupTemplateSelection() {
            const templates = document.querySelectorAll(".template-card-item");
            templates.forEach((card, index) => {
                card.addEventListener("click", () => {
                    templates.forEach(c => c.classList.remove("selected-active"));
                    card.classList.add("selected-active");
                    currentTemplateIndex = index + 1;
                    renderTemplate();
                });
            });
        }

        // Khởi động đồng bộ tức thì
        window.onload = function() {
            setupTemplateSelection();
            renderTemplate(); 
            
            setInterval(() => {
                renderTemplate(); 
            }, 1000);

            const btnSync = document.getElementById("btn-sync-hardware");
            if(btnSync) {
                btnSync.addEventListener("click", () => {
                    alert("Đang kết nối Bluetooth và đóng gói dữ liệu màn hình 2.9 inch...");
                });
            }
        };
    </script>
</body>
</html>
