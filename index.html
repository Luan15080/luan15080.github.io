<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper 2.9" - Đồng Bộ Mặt Đồng Hồ</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-calendar/0.1.4/lunar-calendar.min.js"></script>

    <style>
        :root {
            --primary-color: #4CAF50;
            --blue-color: #2196F3;
            --border-color: #ccc;
            --bg-preview: #fff;
            /* Màu trạng thái mới */
            --yellow: #FFC107;
            --red: #F44336;
        }
        body { font-family: Arial, sans-serif; margin: 10px; padding: 0; background-color: #f9f9f9; }
        
        /* NÚT KẾT NỐI MỚI (Thay cho btn-group cũ) */
        .btn-conn { 
            width: 100%; padding: 15px; border: none; border-radius: 6px; 
            font-weight: bold; color: white; cursor: pointer; text-align: center; 
            font-size: 16px; margin-bottom: 15px; transition: 0.3s;
        }
        .state-idle { background-color: var(--primary-color); }
        .state-connecting { background-color: var(--yellow); color: #333; }
        .state-connected { background-color: var(--blue-color); }
        .state-error { background-color: var(--red); }

        .section-title { font-size: 16px; font-weight: bold; color: #333; border-left: 4px solid var(--primary-color); padding-left: 8px; margin: 15px 0 10px 0; }
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .template-card-item { background: white; border: 2px solid #e0e0e0; border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; }
        .template-card-item.selected-active { border-color: var(--blue-color); background-color: #f0f7ff; }
        .card-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #555; }
        .card-demo-box { border: 1px solid #ddd; padding: 15px 5px; border-radius: 4px; background: #fff; min-height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #khung-xem-truoc { border: 3px solid #000; border-radius: 8px; background-color: var(--bg-preview); min-height: 250px; padding: 10px; box-sizing: border-box; margin-bottom: 15px; }
        
        /* Giữ nguyên các class logic layout cũ */
        .template-box { display: flex; flex-direction: column; height: 100%; min-height: 225px; justify-content: space-between; }
        .header-row, .footer-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 3px; margin-bottom: 5px; }
        .footer-row { border-bottom: none; border-top: 1px solid #000; padding-top: 3px; margin-top: 5px; margin-bottom: 5px; }
        .flip-clock-display { display: flex; justify-content: center; align-items: center; gap: 4px; margin: 15px 0; }
        .flip-unit { background: #000; color: #fff; font-size: 45px; font-weight: bold; padding: 3px 10px; border-radius: 4px; }
        .flip-separator { font-size: 35px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .month-split-container { display: flex; flex: 1; gap: 12px; align-items: center; min-height: 125px; }
        .calendar-matrix-left { flex: 1.3; }
        .analog-clock-right { flex: 0.7; display: flex; justify-content: center; align-items: center; }
        .grid-week-header, .grid-days-body { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .grid-week-header { font-size: 11px; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 2px; }
        .grid-days-body { row-gap: 4px; margin-top: 4px; }
        .day-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px 0; }
        .day-item .solar-day { font-size: 12px; font-weight: bold; color: #000; }
        .day-item .lunar-sub-day { font-size: 8px; color: #555; }
        .active-today { background-color: #000; border-radius: 4px; }
        .active-today .solar-day, .active-today .lunar-sub-day { color: #fff !important; }
        .analog-dial { width: 95px; height: 95px; border: 2px solid #000; border-radius: 50%; position: relative; }
        .hour-mark { position: absolute; font-size: 9px; font-weight: bold; }
        .m-12 { top: 1px; left: 50%; transform: translateX(-50%); }
        .m-3 { right: 3px; top: 50%; transform: translateY(-50%); }
        .m-6 { bottom: 1px; left: 50%; transform: translateX(-50%); }
        .m-9 { left: 3px; top: 50%; transform: translateY(-50%); }
        .hand { position: absolute; bottom: 50%; left: 50%; background-color: #000; transform-origin: bottom center; border-radius: 1px; }
        .hour-hand { width: 3px; height: 25px; }
        .minute-hand { width: 2px; height: 35px; }
        .second-hand { width: 1px; height: 38px; background-color: red; }
        .global-footer-quote-zone { width: 100%; text-align: center; font-size: 12px; font-style: italic; font-weight: bold; color: #000; padding-top: 4px; border-top: 1px solid #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: auto; }
        .adjustment-box { margin-top: 15px; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .input-row input { width: 60%; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; }
        .log-box { margin-top: 15px; background: #222; color: #22ff22; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 4px; max-height: 120px; overflow-y: auto; }
    </style>
</head>
<body>

    <button id="btn-bluetooth" class="btn-conn state-idle">Kết nối Bluetooth</button>

    <div class="section-title">Chạm Trực Tiếp Để Chọn Mặt Màn Hình</div>
    <div class="template-grid">
        <div class="template-card-item selected-active"><div class="card-title">Mẫu 1: Đồng Hồ Lật Dài</div><div class="card-demo-box" style="background:#000; color:#fff;">12:30</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 2: Lịch Lớn Tối Giản</div><div class="card-demo-box">05</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 3: Số Hiện Đại To</div><div class="card-demo-box">12:30</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 4: Lịch Âm Dương Rõ</div><div class="card-demo-box" style="color:red; font-size:11px;">ÂM LỊCH</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 5: Lịch Tháng</div><div class="card-demo-box" style="font-size:11px;">📅</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 6: Đồng Hồ Kim Tròn</div><div class="card-demo-box">🕒</div></div>
    </div>

    <div class="section-title">Khung Xem Trước Thực Tế</div>
    <div id="khung-xem-truoc"></div>

    <button class="btn-conn" id="btn-transfer-data" style="background-color: var(--blue-color);">ĐỒNG BỘ GIỜ ĐIỆN THOẠI XUỐNG MÀN HÌNH</button>

    <div class="adjustment-box">
        <div class="input-row"><label>Dương Lịch:</label><input type="text" id="input-duong-lich" readonly></div>
        <div class="input-row"><label>Âm Lịch:</label><input type="text" id="input-am-lich" readonly></div>
        <div class="input-row"><label>Hiệu chỉnh nhiệt độ (°C):</label><input type="number" id="input-nhiet-do" value="30"></div>
    </div>

    <div class="log-box" id="system-log">Hệ thống sẵn sàng.</div>

    <script>
        const btnBluetooth = document.getElementById('btn-bluetooth');
        
        // Hàm cập nhật trạng thái nút mới
        function updateBtnState(state) {
            btnBluetooth.className = "btn-conn";
            if(state === 'idle') { btnBluetooth.classList.add('state-idle'); btnBluetooth.innerText = "Kết nối Bluetooth"; }
            else if(state === 'connecting') { btnBluetooth.classList.add('state-connecting'); btnBluetooth.innerText = "🔄 Đang kết nối..."; }
            else if(state === 'connected') { btnBluetooth.classList.add('state-connected'); btnBluetooth.innerText = "✅ Đã kết nối"; }
            else if(state === 'error') { btnBluetooth.classList.add('state-error'); btnBluetooth.innerText = "❌ Thử lại kết nối"; }
        }

        // Logic Bluetooth cũ của anh tích hợp nút mới
        btnBluetooth.addEventListener('click', async () => {
            updateBtnState('connecting');
            try {
                // Dán logic kết nối của anh vào đây
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, 
                    optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
                });
                await device.gatt.connect();
                updateBtnState('connected');
                device.addEventListener('gattserverdisconnected', () => updateBtnState('error'));
            } catch (err) {
                updateBtnState('error');
            }
        });

        // (Giữ nguyên các hàm renderTemplate và xử lý của anh tại đây)
        // Lưu ý: Đảm bảo anh đã copy đủ các hàm function cũ vào dưới đây
    </script>
</body>
</html>
