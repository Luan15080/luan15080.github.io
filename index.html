<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper 2.9" - Đồng Bộ Mặt Đồng Hồ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-calendar/0.1.4/lunar-calendar.min.js"></script>
    <style>
        :root { --primary-color: #4CAF50; --blue-color: #2196F3; --border-color: #ccc; }
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f9f9f9; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-green { background-color: var(--primary-color); color: white; border: none; }
        .section-title { font-size: 16px; font-weight: bold; color: #333; border-left: 4px solid var(--primary-color); padding-left: 8px; margin: 15px 0 10px 0; }
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .template-card-item { background: white; border: 2px solid #e0e0e0; border-radius: 6px; padding: 10px; cursor: pointer; }
        .template-card-item.selected-active { border-color: var(--blue-color); background-color: #f0f7ff; }
        #khung-xem-truoc { border: 3px solid #000; border-radius: 8px; background: #fff; min-height: 250px; padding: 10px; margin-bottom: 15px; }
        .log-box { margin-top: 15px; background: #222; color: #22ff22; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 4px; max-height: 150px; overflow-y: auto; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="btn-group">
        <button class="btn btn-green" id="btn-sync-hardware">Kết nối Bluetooth</button>
    </div>

    <div class="section-title">Chọn Mặt Màn Hình</div>
    <div class="template-grid" id="grid">
        <div class="template-card-item selected-active" onclick="selectTemplate(1)">Mẫu 1: Lật Dài</div>
        <div class="template-card-item" onclick="selectTemplate(2)">Mẫu 2: Lịch Tối Giản</div>
        <div class="template-card-item" onclick="selectTemplate(3)">Mẫu 3: Số To</div>
        <div class="template-card-item" onclick="selectTemplate(4)">Mẫu 4: Âm Dương</div>
        <div class="template-card-item" onclick="selectTemplate(5)">Mẫu 5: Lịch Tháng</div>
        <div class="template-card-item" onclick="selectTemplate(6)">Mẫu 6: Kim Tròn</div>
    </div>

    <div class="section-title">Khung Xem Trước</div>
    <div id="khung-xem-truoc"></div>

    <button class="btn btn-green" id="btn-transfer-data" style="width:100%">ĐỒNG BỘ DỮ LIỆU</button>

    <div class="log-box" id="system-log">Hệ thống: Sẵn sàng kết nối với DLG-CLOCK.</div>

    <script>
        let currentTemplateIndex = 1;
        let bleCharacteristic = null;
        const SERVICE_UUID = '18424398-7cbc-11e9-8f9e-2a86e4085a59';

        function logToSystem(text) {
            const logBox = document.getElementById("system-log");
            logBox.innerHTML += `<br>• ${text}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function selectTemplate(idx) {
            currentTemplateIndex = idx;
            document.querySelectorAll('.template-card-item').forEach((el, i) => {
                el.classList.toggle('selected-active', i === idx - 1);
            });
            renderPreview();
        }

        async function connectBluetooth() {
            try {
                logToSystem("Đang quét thiết bị...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                logToSystem(`Kết nối: ${device.name}`);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristics = await service.getCharacteristics();
                bleCharacteristic = characteristics[0];
                logToSystem("Kết nối Characteristic thành công!");
                alert("Đã kết nối!");
            } catch (error) {
                logToSystem(`Lỗi: ${error.message}`);
            }
        }

        async function transferData() {
            if (!bleCharacteristic) { alert("Vui lòng kết nối trước!"); return; }
            try {
                const now = new Date();
                const data = new Uint8Array([0xAA, currentTemplateIndex, now.getFullYear()%100, now.getMonth()+1, now.getDate(), now.getHours(), now.getMinutes(), now.getDay(), 30, 0xBB]);
                await bleCharacteristic.writeValue(data);
                logToSystem("Đã gửi dữ liệu Mẫu " + currentTemplateIndex);
            } catch (error) {
                logToSystem(`Lỗi truyền: ${error.message}`);
            }
        }

        function renderPreview() {
            const now = new Date();
            document.getElementById("khung-xem-truoc").innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <h3>Mẫu đang chọn: ${currentTemplateIndex}</h3>
                    <div style="font-size:30px; font-weight:bold;">${now.getHours()}:${now.getMinutes()}</div>
                    <p>${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}</p>
                </div>`;
        }

        document.getElementById("btn-sync-hardware").addEventListener("click", connectBluetooth);
        document.getElementById("btn-transfer-data").addEventListener("click", transferData);
        renderPreview();
    </script>
</body>
</html>
