<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper 2.9" - Đồng Bộ Mặt Đồng Hồ</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-calendar/0.1.4/lunar-calendar.min.js"></script>

    <style>
        :root {
            --primary-color: #4CAF50;
            --blue-color: #2196F3;
            --border-color: #ccc;
            --bg-preview: #fff;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            padding: 0;
            background-color: #f9f9f9;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn-green { background-color: var(--primary-color); color: white; border: none; }
        .btn-outline { background-color: white; color: #333; }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
            margin: 15px 0 10px 0;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .template-card-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .template-card-item.selected-active {
            border-color: var(--blue-color);
            background-color: #f0f7ff;
        }
        .card-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #555; }
        .card-demo-box {
            border: 1px solid #ddd;
            padding: 15px 5px;
            border-radius: 4px;
            background: #fff;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        #khung-xem-truoc {
            border: 3px solid #000;
            border-radius: 8px;
            background-color: var(--bg-preview);
            min-height: 250px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        
        .template-box {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 225px;
            justify-content: space-between;
        }
        .header-row, .footer-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 3px;
            margin-bottom: 5px;
        }
        .footer-row {
            border-bottom: none;
            border-top: 1px solid #000;
            padding-top: 3px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .flip-clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin: 15px 0;
        }
        .flip-unit {
            background: #000;
            color: #fff;
            font-size: 45px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 4px;
        }
        .flip-separator {
            font-size: 35px;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .month-split-container {
            display: flex;
            flex: 1;
            gap: 12px;
            align-items: center;
            min-height: 125px;
        }
        .calendar-matrix-left { flex: 1.3; }
        .analog-clock-right { flex: 0.7; display: flex; justify-content: center; align-items: center; }
        .grid-week-header, .grid-days-body { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .grid-week-header { font-size: 11px; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 2px; }
        .grid-days-body { row-gap: 4px; margin-top: 4px; }
        .day-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px 0; }
        .day-item .solar-day { font-size: 12px; font-weight: bold; }
        .day-item .lunar-sub-day { font-size: 8px; color: #555; }
        .day-item.empty { min-height: 20px; }
        .active-today { background-color: #000; border-radius: 4px; }
        .active-today .solar-day, .active-today .lunar-sub-day { color: #fff !important; }
        
        .analog-dial { width: 95px; height: 95px; border: 2px solid #000; border-radius: 50%; position: relative; }
        .hour-mark { position: absolute; font-size: 9px; font-weight: bold; }
        .m-12 { top: 1px; left: 50%; transform: translateX(-50%); }
        .m-3 { right: 3px; top: 50%; transform: translateY(-50%); }
        .m-6 { bottom: 1px; left: 50%; transform: translateX(-50%); }
        .m-9 { left: 3px; top: 50%; transform: translateY(-50%); }
        .hand { position: absolute; bottom: 50%; left: 50%; background-color: #000; transform-origin: bottom center; border-radius: 1px; }
        .hour-hand { width: 3px; height: 25px; }
        .minute-hand { width: 2px; height: 35px; }
        .second-hand { width: 1px; height: 38px; background-color: red; }

        .global-footer-quote-zone {
            width: 100%; text-align: center; font-size: 12px; font-style: italic; font-weight: bold;
            color: #000; padding-top: 4px; border-top: 1px solid #000; margin-top: auto;
        }

        .adjustment-box { margin-top: 15px; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .input-row input { width: 60%; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; }
        
        .log-box {
            margin-top: 15px; background: #222; color: #22ff22; font-family: monospace;
            font-size: 11px; padding: 10px; border-radius: 4px; max-height: 120px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="btn-group">
        <button class="btn btn-green" id="btn-sync-hardware">Kết nối Bluetooth</button>
        <button class="btn btn-outline">Kho Mẫu Đồng Hồ</button>
    </div>

    <div class="section-title">Chạm Trực Tiếp Để Chọn Mặt Màn Hình</div>
    <div class="template-grid" id="template-container">
        <div class="template-card-item selected-active"><div class="card-title">Mẫu 1: Đồng Hồ Lật Dài</div><div class="card-demo-box">12:30</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 2: Lịch Lớn Tối Giản</div><div class="card-demo-box">05</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 3: Số Hiện Đại To</div><div class="card-demo-box">12:30</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 4: Lịch Âm Dương Rõ</div><div class="card-demo-box">ÂM LỊCH</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 5: Lịch 1 Tháng</div><div class="card-demo-box">📅 Lịch</div></div>
        <div class="template-card-item"><div class="card-title">Mẫu 6: Đồng Hồ Kim Tròn</div><div class="card-demo-box">🕒</div></div>
    </div>

    <div class="section-title">Khung Xem Trước Thực Tế</div>
    <div id="khung-xem-truoc"></div>

    <button class="btn btn-green" id="btn-transfer-data" style="width:100%; margin-top:5px; margin-bottom:15px; background-color: var(--blue-color);">
        ĐỒNG BỘ GIỜ ĐIỆN THOẠI XUỐNG MÀN HÌNH
    </button>

    <div class="adjustment-box">
        <div class="input-row"><label>Dương Lịch:</label><input type="text" id="input-duong-lich" readonly></div>
        <div class="input-row"><label>Âm Lịch:</label><input type="text" id="input-am-lich" readonly></div>
        <div class="input-row"><label>Thứ hiện tại:</label><input type="text" id="input-thu" readonly></div>
        <div class="input-row"><label>Nhiệt độ (°C):</label><input type="number" id="input-nhiet-do" value="30"></div>
    </div>

    <div class="log-box" id="system-log">Hệ thống: Sẵn sàng.</div>

    <script>
        let currentTemplateIndex = 1;
        let bleCharacteristic = null;

        function logToSystem(text) {
            const logBox = document.getElementById("system-log");
            logBox.innerHTML += `<br>• ${text}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Hàm kết nối linh động: Không cần UUID cố định
        async function connectBluetooth() {
            try {
                logToSystem("Đang tìm thiết bị...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['00001f10-0000-1000-8000-00805f9b34fb'] // Thêm service dự phòng
                });

                logToSystem(`Đang kết nối: ${device.name}`);
                const server = await device.gatt.connect();
                
                logToSystem("Đang quét dịch vụ...");
                const services = await server.getPrimaryServices();
                
                for (const service of services) {
                    const chars = await service.getCharacteristics();
                    for (const char of chars) {
                        // Tự động tìm cổng cho phép Ghi (Write)
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            bleCharacteristic = char;
                            logToSystem("Kết nối thành công & sẵn sàng gửi!");
                            alert("Đã kết nối!");
                            return;
                        }
                    }
                }
                throw new Error("Không tìm thấy cổng truyền dữ liệu.");
            } catch (error) {
                logToSystem(`Lỗi: ${error.message}`);
            }
        }

        async function transferDataToHardware() {
            if (!bleCharacteristic) { alert("Chưa kết nối Bluetooth!"); return; }
            try {
                const now = new Date();
                let buffer = new Uint8Array([0xAA, currentTemplateIndex, now.getFullYear()%100, now.getMonth()+1, now.getDate(), now.getHours(), now.getMinutes(), now.getDay(), 30, 0xBB]);
                await bleCharacteristic.writeValue(buffer);
                logToSystem("Đã đồng bộ!");
            } catch (e) {
                logToSystem("Lỗi truyền dữ liệu: " + e.message);
            }
        }

        // --- Các hàm render và UI giữ nguyên ---
        function setupUI() {
            document.querySelectorAll(".template-card-item").forEach((card, idx) => {
                card.onclick = () => {
                    document.querySelectorAll(".template-card-item").forEach(c => c.classList.remove("selected-active"));
                    card.classList.add("selected-active");
                    currentTemplateIndex = idx + 1;
                    logToSystem("Chọn mẫu " + currentTemplateIndex);
                };
            });
            document.getElementById("btn-sync-hardware").onclick = connectBluetooth;
            document.getElementById("btn-transfer-data").onclick = transferDataToHardware;
        }

        window.onload = setupUI;
    </script>
</body>
</html>
