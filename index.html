<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper 2.9" - Đầy Đủ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-calendar/0.1.4/lunar-calendar.min.js"></script>
    <style>
        /* Nút Bluetooth mới */
        .btn-conn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; text-align: center; font-size: 16px; margin-bottom: 15px; transition: 0.3s; }
        .state-idle { background-color: #4CAF50; }
        .state-connecting { background-color: #FFC107; color: #333; }
        .state-connected { background-color: #2196F3; }
        .state-error { background-color: #F44336; }

        /* Style gốc của anh */
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f9f9f9; }
        .section-title { font-size: 16px; font-weight: bold; margin: 15px 0; padding-left: 8px; border-left: 4px solid #4CAF50; }
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .template-card-item { background: white; border: 2px solid #e0e0e0; border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; }
        .selected-active { border-color: #2196F3; background-color: #f0f7ff; }
        #khung-xem-truoc { border: 3px solid #000; border-radius: 8px; background: #fff; min-height: 250px; padding: 10px; margin-bottom: 15px; }
        .btn-sync { width: 100%; padding: 15px; background: #2196F3; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .input-row input { width: 60%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <button id="btn-bluetooth" class="btn-conn state-idle">Kết nối Bluetooth</button>

    <div class="section-title">Chọn mẫu mặt đồng hồ:</div>
    <div class="template-grid" id="grid-templates">
        <div class="template-card-item" onclick="selectTemplate(1)">Mẫu 1: Lật Dài</div>
        <div class="template-card-item" onclick="selectTemplate(2)">Mẫu 2: Lịch Số</div>
        <div class="template-card-item" onclick="selectTemplate(3)">Mẫu 3: Số To</div>
        <div class="template-card-item" onclick="selectTemplate(4)">Mẫu 4: Âm Dương</div>
        <div class="template-card-item" onclick="selectTemplate(5)">Mẫu 5: Tháng</div>
        <div class="template-card-item" onclick="selectTemplate(6)">Mẫu 6: Kim Tròn</div>
    </div>

    <div class="section-title">Khung Xem Trước Thực Tế:</div>
    <div id="khung-xem-truoc"></div>

    <button class="btn-sync" id="btn-transfer-data">ĐỒNG BỘ GIỜ ĐIỆN THOẠI XUỐNG MÀN HÌNH</button>

    <div style="margin-top:20px;">
        <div class="input-row"><label>Dương Lịch:</label><input type="text" id="input-duong-lich" readonly></div>
        <div class="input-row"><label>Âm Lịch:</label><input type="text" id="input-am-lich" readonly></div>
        <div class="input-row"><label>Hiệu chỉnh nhiệt độ (°C):</label><input type="number" id="input-nhiet-do" value="30"></div>
    </div>

    <script>
        const btnBluetooth = document.getElementById('btn-bluetooth');
        let bleChar = null;

        // Hàm trạng thái nút
        function updateBtnState(state) {
            btnBluetooth.className = "btn-conn";
            if(state === 'idle') { btnBluetooth.classList.add('state-idle'); btnBluetooth.innerText = "Kết nối Bluetooth"; }
            else if(state === 'connecting') { btnBluetooth.classList.add('state-connecting'); btnBluetooth.innerText = "🔄 Đang kết nối..."; }
            else if(state === 'connected') { btnBluetooth.classList.add('state-connected'); btnBluetooth.innerText = "✅ Đã kết nối"; }
            else if(state === 'error') { btnBluetooth.classList.add('state-error'); btnBluetooth.innerText = "❌ Thử lại kết nối"; }
        }

        // Kết nối Bluetooth
        btnBluetooth.addEventListener('click', async () => {
            updateBtnState('connecting');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, 
                    optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
                bleChar = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");
                updateBtnState('connected');
                device.addEventListener('gattserverdisconnected', () => updateBtnState('error'));
            } catch (err) { updateBtnState('error'); }
        });

        // Hàm gốc của anh
        function selectTemplate(id) {
            render(id);
        }

        function render(id) {
            // Dán lại code vẽ màn hình cũ của anh vào đây
            document.getElementById('khung-xem-truoc').innerHTML = "Đang hiển thị mẫu " + id;
        }

        document.getElementById('btn-transfer-data').onclick = async () => {
            if(!bleChar) { alert("Kết nối Bluetooth trước!"); return; }
            // Dán lại code gửi dữ liệu xuống mạch của anh vào đây
            alert("Đang đồng bộ...");
        };
    </script>
</body>
</html>
