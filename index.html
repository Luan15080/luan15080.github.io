<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ E-Paper 2.9"</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-calendar/0.1.4/lunar-calendar.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background-color: #f4f4f4; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; text-align: center; font-size: 16px; margin-bottom: 10px; transition: 0.3s; }
        
        /* Trạng thái nút theo yêu cầu của anh */
        .state-idle { background-color: #4CAF50; } 
        .state-connecting { background-color: #FFC107; color: #333; } 
        .state-connected { background-color: #2196F3; } 
        .state-error { background-color: #F44336; } 

        .section-title { font-weight: bold; margin: 15px 0 10px; border-left: 4px solid #333; padding-left: 8px; }
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: white; border: 2px solid #ddd; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; }
        .card.active { border-color: #2196F3; background: #e3f2fd; }
        #khung-xem-truoc { border: 3px solid #000; border-radius: 8px; background: white; min-height: 250px; padding: 10px; margin-bottom: 15px; }
        .btn-sync { width: 100%; padding: 15px; background: #2196F3; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        input { padding: 5px; width: 60%; }
    </style>
</head>
<body>

    <button id="btn-bluetooth" class="btn-main state-idle">Kết nối Bluetooth</button>

    <div class="section-title">Chọn mẫu mặt đồng hồ:</div>
    <div class="template-grid" id="grid-templates">
        <div class="card" onclick="selectTemplate(1)">Mẫu 1: Lật Dài</div>
        <div class="card" onclick="selectTemplate(2)">Mẫu 2: Lịch Số</div>
        <div class="card" onclick="selectTemplate(3)">Mẫu 3: Số To</div>
        <div class="card" onclick="selectTemplate(4)">Mẫu 4: Âm Dương</div>
        <div class="card active" onclick="selectTemplate(5)">Mẫu 5: Tháng</div>
        <div class="card" onclick="selectTemplate(6)">Mẫu 6: Kim Tròn</div>
    </div>

    <div class="section-title">Khung Xem Trước Thực Tế:</div>
    <div id="khung-xem-truoc"></div>

    <button class="btn-sync" id="btn-sync-data">ĐỒNG BỘ GIỜ ĐIỆN THOẠI XUỐNG MÀN HÌNH</button>

    <div style="margin-top:20px;">
        <div class="info-row"><label>Dương Lịch:</label><input type="text" id="date-val" readonly></div>
        <div class="info-row"><label>Âm Lịch:</label><input type="text" id="lunar-val" readonly></div>
        <div class="info-row"><label>Thứ hiện tại:</label><input type="text" id="day-val" readonly></div>
        <div class="info-row"><label>Hiệu chỉnh nhiệt độ (°C):</label><input type="number" id="temp-val" value="30"></div>
    </div>

    <script>
        const btnBluetooth = document.getElementById('btn-bluetooth');
        
        // Hàm cập nhật trạng thái nút (Gộp 4 trạng thái vào 1)
        function updateBtnState(state) {
            btnBluetooth.className = "btn-main";
            if(state === 'idle') { btnBluetooth.classList.add('state-idle'); btnBluetooth.innerText = "Kết nối Bluetooth"; }
            else if(state === 'connecting') { btnBluetooth.classList.add('state-connecting'); btnBluetooth.innerText = "🔄 Đang kết nối..."; }
            else if(state === 'connected') { btnBluetooth.classList.add('state-connected'); btnBluetooth.innerText = "✅ Đã kết nối"; }
            else if(state === 'error') { btnBluetooth.classList.add('state-error'); btnBluetooth.innerText = "❌ Thử lại kết nối"; }
        }

        // Sự kiện kết nối Bluetooth
        btnBluetooth.addEventListener('click', async () => {
            updateBtnState('connecting');
            try {
                // Logic kết nối của anh
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, 
                    optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
                });
                await device.gatt.connect();
                updateBtnState('connected');
                device.addEventListener('gattserverdisconnected', () => updateBtnState('error'));
            } catch (err) {
                console.error(err);
                updateBtnState('error');
            }
        });

        function selectTemplate(idx) {
            document.querySelectorAll('.card').forEach((c, i) => c.className = (i+1 === idx) ? 'card active' : 'card');
        }
        
        // Anh dán lại các đoạn script vẽ khung (render) cũ của anh vào đây là mọi thứ sẽ hoàn hảo!
    </script>
</body>
</html>
